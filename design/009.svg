<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <filter id="popoverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.9"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#050505" />
  <text x="80" y="60" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold">ProjectFlow</text>
  <line x1="0" y1="90" x2="1200" y2="90" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

  <g transform="translate(440, 140)">
    <text x="0" y="0" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" letter-spacing="1">HACIENDO</text>
    <rect x="75" y="-12" width="20" height="16" rx="8" fill="#1A1A1A" stroke="rgba(255,255,255,0.15)" />
    <text x="85" y="0" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">2</text>

    <g transform="translate(0, 30)">
      <rect width="320" height="90" rx="8" fill="#111111" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
      <circle cx="20" cy="25" r="4" fill="#3FB950" />
      <text x="35" y="30" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Investigar nueva API</text>
      
      <rect x="20" y="55" width="70" height="20" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" />
      <text x="55" y="69" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">Backend</text>

      <rect x="100" y="55" width="40" height="20" rx="10" fill="transparent" stroke="rgba(255,255,255,0.15)" stroke-dasharray="3 3" />
      <path d="M 115 62 L 120 70 L 110 70 Z" fill="rgba(255,255,255,0.2)" />
    </g>

    <g transform="translate(0, 140)">
      <rect width="320" height="110" rx="8" fill="#161B22" stroke="rgba(88,166,255,0.4)" stroke-width="1" filter="url(#glow)" />
      
      <circle cx="20" cy="25" r="4" fill="#F85149" />
      <text x="35" y="30" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Crear componente DuePill</text>
      <text x="20" y="55" fill="#CCCCCC" font-family="system-ui, -apple-system, sans-serif" font-size="13">Implementar estilos modulares y props.</text>
      
      <rect x="20" y="75" width="75" height="20" rx="4" fill="rgba(88,166,255,0.1)" stroke="rgba(88,166,255,0.2)" />
      <text x="57" y="89" fill="#58A6FF" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">Frontend</text>

      <rect x="105" y="75" width="36" height="20" rx="10" fill="#1A1A1A" stroke="rgba(255,255,255,0.1)" />
      <path d="M 115 82 L 118 88 L 112 88 Z" fill="#888888" />
      <text x="128" y="89" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" text-anchor="middle">3</text>

      <g transform="translate(100, 105)" filter="url(#popoverShadow)">
        <polygon points="15,0 25,10 5,10" fill="#1D2128" />
        
        <rect y="8" width="220" height="80" rx="8" fill="#1D2128" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
        
        <text x="16" y="30" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5">ESTIMACIÓN (PUNTOS)</text>
        
        <g transform="translate(16, 45)">
          
          <rect x="0" y="0" width="28" height="24" rx="4" fill="rgba(255,255,255,0.05)" />
          <text x="14" y="16" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="13" text-anchor="middle">1</text>
          
          <rect x="34" y="0" width="28" height="24" rx="4" fill="rgba(255,255,255,0.05)" />
          <text x="48" y="16" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="13" text-anchor="middle">2</text>
          
          <rect x="68" y="0" width="28" height="24" rx="4" fill="#58A6FF" />
          <text x="82" y="16" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" text-anchor="middle">3</text>
          
          <rect x="102" y="0" width="28" height="24" rx="4" fill="rgba(255,255,255,0.05)" />
          <text x="116" y="16" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="13" text-anchor="middle">5</text>
          
          <rect x="136" y="0" width="28" height="24" rx="4" fill="rgba(255,255,255,0.05)" />
          <text x="150" y="16" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="13" text-anchor="middle">8</text>
          
          <rect x="170" y="0" width="20" height="24" rx="4" fill="transparent" />
          <text x="180" y="17" fill="#666666" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-anchor="middle">×</text>

        </g>
      </g>
    </g>
  </g>
</svg>