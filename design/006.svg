<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <linearGradient id="activeBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8957E5" stop-opacity="0.9"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#050505" />

  <g opacity="0.5">
    <text x="80" y="60" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold">ProjectFlow</text>
    <line x1="0" y1="90" x2="1200" y2="90" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  </g>

  <g transform="translate(80, 140)">
    
    <g transform="translate(0, 0)" opacity="0.4">
      <text x="0" y="0" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" letter-spacing="1">IDEAS</text>
      <rect x="55" y="-12" width="20" height="16" rx="8" fill="#141414" stroke="rgba(255,255,255,0.08)" />
      <text x="65" y="0" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">1</text>
      
      <g transform="translate(0, 30)">
        <rect width="320" height="90" rx="8" fill="#111111" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
        <circle cx="20" cy="25" r="4" fill="#3FB950" />
        <text x="35" y="30" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Investigar nueva API</text>
        <rect x="20" y="55" width="70" height="20" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" />
        <text x="55" y="69" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">Backend</text>
      </g>
    </g>

    <g transform="translate(360, 0)">
      <text x="0" y="0" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" letter-spacing="1">HACIENDO</text>
      <rect x="75" y="-12" width="20" height="16" rx="8" fill="#1A1A1A" stroke="rgba(255,255,255,0.15)" />
      <text x="85" y="0" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">3</text>

      <g transform="translate(0, 30)">
        <rect width="320" height="110" rx="8" fill="rgba(88,166,255,0.02)" stroke="#58A6FF" stroke-width="1.5" stroke-dasharray="8 6" />
        <text x="160" y="60" fill="#58A6FF" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" text-anchor="middle">Soltar aquí</text>
      </g>

      <g transform="translate(0, 160)" opacity="0.4">
        <rect width="320" height="110" rx="8" fill="#111111" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
        <circle cx="20" cy="25" r="4" fill="#F85149" />
        <text x="35" y="30" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Crear componente DuePill</text>
        <text x="20" y="55" fill="#AAAAAA" font-family="system-ui, -apple-system, sans-serif" font-size="13">Implementar estilos modulares...</text>
      </g>
    </g>

    <g transform="translate(720, 0)" opacity="0.4">
      <text x="0" y="0" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" letter-spacing="1">HECHO</text>
      <g transform="translate(0, 30)">
        <rect width="320" height="60" rx="8" fill="#0A0A0A" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
        <text x="20" y="35" fill="#777777" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-decoration="line-through">Bocetos isotipo El Chañi</text>
      </g>
    </g>
  </g>

  <g transform="translate(380, 190) rotate(2)" opacity="0.7" filter="url(#glow)">
    <rect width="320" height="110" rx="8" fill="#161B22" stroke="url(#activeBorder)" stroke-width="2" />
    
    <circle cx="20" cy="25" r="4" fill="#E2B93B" />
    <text x="35" y="30" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Ajustar paleta de colores</text>
    <text x="20" y="55" fill="#CCCCCC" font-family="system-ui, -apple-system, sans-serif" font-size="13">Revisar contrastes para accesibilidad.</text>
    <rect x="20" y="75" width="60" height="20" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" />
    <text x="50" y="89" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">Diseño</text>
    
    <g transform="translate(300, 90)">
       <circle cx="10" cy="10" r="15" fill="#58A6FF" fill-opacity="0.2" stroke="#58A6FF" stroke-width="1"/>
       <path d="M 10 5 L 10 15 M 5 10 L 15 10" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

</svg>