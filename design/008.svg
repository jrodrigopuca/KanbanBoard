<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#316DCA" stop-opacity="1"/>
    </linearGradient>
    <filter id="toastShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000000" flood-opacity="0.9"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.03)" />
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="#050505" />
  
  <rect width="1200" height="800" fill="url(#grid)" />

  <text x="80" y="60" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold">ProjectFlow</text>
  <circle cx="1120" cy="53" r="16" fill="#141414" stroke="rgba(255,255,255,0.1)" />
  <text x="1120" y="58" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-anchor="middle">U</text>
  <line x1="0" y1="90" x2="1200" y2="90" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

  <g transform="translate(600, 380)">
    
    <rect x="-110" y="-120" width="60" height="80" rx="6" fill="transparent" stroke="rgba(255,255,255,0.05)" stroke-width="2" stroke-dasharray="4 4" />
    <rect x="-30" y="-140" width="60" height="100" rx="6" fill="transparent" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-dasharray="4 4" />
    <rect x="50" y="-100" width="60" height="60" rx="6" fill="transparent" stroke="rgba(255,255,255,0.03)" stroke-width="2" stroke-dasharray="4 4" />
    
    <circle cx="0" cy="-90" r="60" fill="#58A6FF" opacity="0.05" filter="blur(20px)" />

    <text x="0" y="0" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" text-anchor="middle">Bienvenido a tu espacio de enfoque</text>
    <text x="0" y="30" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="16" text-anchor="middle">No hay tableros ni tareas activas. Es el momento perfecto para empezar.</text>

    <rect x="-100" y="65" width="200" height="44" rx="8" fill="url(#primaryGradient)" />
    <text x="0" y="93" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" text-anchor="middle">+ Crear mi primer tablero</text>

    <text x="0" y="140" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="13" text-anchor="middle">O presiona <tspan fill="#888">Cmd + K</tspan> para abrir los comandos</text>
  </g>

  <g transform="translate(420, 710)" filter="url(#toastShadow)">
    <rect width="360" height="48" rx="24" fill="#161B22" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    
    <circle cx="24" cy="24" r="10" fill="#3FB950" fill-opacity="0.2" />
    <path d="M 20 24 L 23 27 L 29 20" fill="transparent" stroke="#3FB950" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

    <text x="45" y="29" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="14">Columna 'Backlog' eliminada.</text>
    
    <text x="280" y="29" fill="#58A6FF" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" cursor="pointer">Deshacer</text>
    
    <rect x="345" y="16" width="24" height="16" rx="4" fill="rgba(255,255,255,0.05)" />
    <text x="357" y="27" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">⌘Z</text>
  </g>

</svg>