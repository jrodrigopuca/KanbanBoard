<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <rect width="1200" height="800" fill="#050505" />
  
  <text x="80" y="60" fill="#444" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold">ProjectFlow</text>
  <rect x="80" y="140" width="300" height="110" rx="8" fill="#0A0A0A" stroke="#111" />
  <rect x="400" y="140" width="300" height="110" rx="8" fill="#0A0A0A" stroke="#111" />
  
  <rect width="1200" height="800" fill="#000000" fill-opacity="0.6" />

  <g transform="translate(700, 0)">
    <rect width="500" height="800" fill="#0A0A0A" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    
    <text x="30" y="40" fill="#666666" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">HACIENDO <tspan fill="#444"> / </tspan> PROJ-12</text>
    
    <rect x="440" y="20" width="32" height="32" rx="6" fill="rgba(255,255,255,0.02)" />
    <text x="456" y="41" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="16" text-anchor="middle">×</text>
    <line x1="0" y1="70" x2="500" y2="70" stroke="rgba(255,255,255,0.05)" />

    <text x="30" y="120" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600">Crear componente DuePill</text>

    <g transform="translate(30, 160)">
      
      <text x="0" y="15" fill="#777777" font-family="system-ui, -apple-system, sans-serif" font-size="13">Estado</text>
      <rect x="120" y="2" width="90" height="20" rx="4" fill="rgba(255,255,255,0.05)" />
      <circle cx="132" cy="12" r="4" fill="#F85149" />
      <text x="144" y="16" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="12">Haciendo</text>

      <text x="0" y="50" fill="#777777" font-family="system-ui, -apple-system, sans-serif" font-size="13">Prioridad</text>
      <text x="120" y="50" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="13">Alta</text>

      <text x="0" y="85" fill="#777777" font-family="system-ui, -apple-system, sans-serif" font-size="13">Etiquetas</text>
      <rect x="120" y="70" width="75" height="22" rx="4" fill="rgba(88,166,255,0.05)" stroke="rgba(88,166,255,0.2)" />
      <text x="157" y="85" fill="#58A6FF" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">Frontend</text>
      <rect x="205" y="70" width="22" height="22" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-dasharray="2 2" />
      <text x="216" y="86" fill="#666" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-anchor="middle">+</text>
    </g>

    <line x1="30" y1="280" x2="470" y2="280" stroke="rgba(255,255,255,0.05)" />

    <text x="30" y="320" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Descripción</text>
    
    <rect x="30" y="340" width="440" height="120" rx="6" fill="transparent" stroke="rgba(255,255,255,0.05)" />
    <text x="45" y="370" fill="#AAAAAA" font-family="system-ui, -apple-system, sans-serif" font-size="14" line-height="1.5">
      <tspan x="45" dy="0">Implementar el componente asegurando que</tspan>
      <tspan x="45" dy="22">soporte estilos mediante módulos CSS.</tspan>
      <tspan x="45" dy="22">Validar que las props estén tipadas.</tspan>
    </text>

    <text x="30" y="500" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Subtareas</text>
    <rect x="115" y="487" width="24" height="16" rx="8" fill="rgba(255,255,255,0.05)" />
    <text x="127" y="499" fill="#888" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">1/2</text>

    <rect x="30" y="520" width="16" height="16" rx="4" fill="#58A6FF" />
    <path d="M 34 528 L 37 531 L 43 524" fill="transparent" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="58" y="533" fill="#666666" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-decoration="line-through">Definir interfaces</text>

    <rect x="30" y="550" width="16" height="16" rx="4" fill="transparent" stroke="rgba(255,255,255,0.2)" />
    <text x="58" y="563" fill="#CCCCCC" font-family="system-ui, -apple-system, sans-serif" font-size="14">Aplicar clsx para clases dinámicas</text>
    
    <text x="30" y="595" fill="#58A6FF" font-family="system-ui, -apple-system, sans-serif" font-size="14">+ Añadir subtarea</text>

  </g>
</svg>
