<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <linearGradient id="focusBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#316DCA" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="focusGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#050505" />

  <text x="80" y="60" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold">ProjectFlow</text>
  <line x1="0" y1="90" x2="1200" y2="90" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

  <g transform="translate(80, 140)">
    
    <g transform="translate(0, 0)">
      <text x="0" y="0" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" letter-spacing="1">IDEAS</text>
      
      <g transform="translate(0, 30)">
        <rect width="320" height="120" rx="8" fill="#0D1117" stroke="url(#focusBorder)" stroke-width="1.5" filter="url(#focusGlow)" />
        
        <text x="20" y="35" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Configurar entorno de</text>
        <rect x="188" y="20" width="2" height="18" fill="#58A6FF" />
        
        <text x="20" y="60" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="13">Añade una descripción (opcional)...</text>
        
        <line x1="20" y1="78" x2="300" y2="78" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
        
        <rect x="20" y="88" width="24" height="20" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.05)" />
        <circle cx="32" cy="98" r="4" fill="#888888" fill-opacity="0.5" />
        
        <rect x="52" y="88" width="75" height="20" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.05)" />
        <text x="89" y="102" fill="#AAAAAA" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">+ Etiqueta</text>

        <rect x="245" y="88" width="55" height="20" rx="4" fill="#58A6FF" fill-opacity="0.1" stroke="#58A6FF" stroke-opacity="0.3" />
        <text x="272" y="102" fill="#58A6FF" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" text-anchor="middle">Enter ↵</text>
      </g>

      <g transform="translate(0, 165)">
        <rect width="320" height="110" rx="8" fill="#111111" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
        <circle cx="20" cy="25" r="4" fill="#E2B93B" />
        <text x="35" y="30" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Ajustar paleta de colores</text>
        <text x="20" y="55" fill="#AAAAAA" font-family="system-ui, -apple-system, sans-serif" font-size="13">Revisar contrastes para accesibilidad.</text>
        <rect x="20" y="75" width="60" height="20" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" />
        <text x="50" y="89" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">Diseño</text>
      </g>

      <g transform="translate(0, 290)">
        <rect width="320" height="90" rx="8" fill="#111111" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
        <circle cx="20" cy="25" r="4" fill="#3FB950" />
        <text x="35" y="30" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Investigar nueva API</text>
        <rect x="20" y="55" width="70" height="20" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" />
        <text x="55" y="69" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">Backend</text>
      </g>
    </g>

    <g transform="translate(360, 0)">
      <text x="0" y="0" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" letter-spacing="1">HACIENDO</text>
      
      <g transform="translate(0, 30)">
        <rect width="320" height="110" rx="8" fill="#111111" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
        <circle cx="20" cy="25" r="4" fill="#F85149" />
        <text x="35" y="30" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Crear componente DuePill</text>
        <text x="20" y="55" fill="#AAAAAA" font-family="system-ui, -apple-system, sans-serif" font-size="13">Implementar estilos modulares y props.</text>
        <rect x="20" y="75" width="75" height="20" rx="4" fill="rgba(88,166,255,0.05)" stroke="rgba(88,166,255,0.1)" />
        <text x="57" y="89" fill="#58A6FF" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">Frontend</text>
      </g>

      <g transform="translate(0, 155)">
        <rect width="320" height="90" rx="8" fill="#111111" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
        <circle cx="20" cy="25" r="4" fill="#3FB950" />
        <text x="35" y="30" fill="#EEEEEE" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Práctica de listening B1</text>
        <rect x="20" y="55" width="70" height="20" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" />
        <text x="55" y="69" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">Personal</text>
      </g>
    </g>

    <g transform="translate(720, 0)">
      <text x="0" y="0" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" letter-spacing="1">HECHO</text>

      <g transform="translate(0, 30)">
        <rect width="320" height="90" rx="8" fill="#0A0A0A" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
        <text x="20" y="30" fill="#777777" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" text-decoration="line-through">Bocetos isotipo El Chañi</text>
        <rect x="20" y="55" width="80" height="20" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.03)" />
        <text x="60" y="69" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">Branding</text>
      </g>
    </g>

  </g>
</svg>